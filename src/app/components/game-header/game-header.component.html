<header class="game-header">
  <h1 class="brand">Kardoria Arena</h1>

  <div class="header-actions">
    <div class="user-chip coin-chip" aria-label="Monedas disponibles">
      <span class="coin-value">{{ userCoins() }}</span>
      <span class="coin-icon" aria-hidden="true">●</span>
    </div>

    <div class="profile-menu">
      <button
        type="button"
        class="user-chip"
        aria-label="Menu de usuario"
        aria-haspopup="menu"
        [attr.aria-expanded]="userMenuOpen()"
        (click)="toggleUserMenu($event)"
      >
        <span class="status-dot" aria-hidden="true"></span>
        <span class="user-name">{{ displayName() }}</span>
        <span class="menu-caret" aria-hidden="true">▾</span>
      </button>

      @if (userMenuOpen()) {
        <div class="user-dropdown" role="menu" aria-label="Opciones de usuario">
          <button type="button" class="dropdown-item" role="menuitem" (click)="openMyAccount()">
            My account
          </button>
          <button type="button" class="dropdown-item danger" role="menuitem" (click)="logout()">
            Cerrar sesion
          </button>
        </div>
      }
    </div>
  </div>
</header>
