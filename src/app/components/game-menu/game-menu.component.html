<section class="game-menu" aria-label="Navegacion del juego">
  <nav class="menu-actions" aria-label="Secciones del juego">
    <div class="menu-options" role="list">
      @for (option of options; track option.id) {
        <button
          type="button"
          class="menu-option"
          [class.is-active]="isActive(option.id)"
          [attr.aria-label]="option.label"
          (mouseenter)="setHoveredOption(option.id)"
          (mouseleave)="setHoveredOption(null)"
          (focus)="setHoveredOption(option.id)"
          (blur)="setHoveredOption(null)"
          (click)="selectOption(option.id)"
        >
          <canvas class="option-canvas" #optionCanvas [attr.data-option]="option.id" aria-hidden="true"></canvas>
          <span class="sr-only">{{ option.label }}</span>
        </button>
      }
    </div>
  </nav>
</section>
